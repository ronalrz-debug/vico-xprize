<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="description" content="Descubre negocios locales en tu colonia — impresiones, pagos, comida, bancos y más." />
  <title>LocalCerca · Tu colonia en el mapa</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Fuentes -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       SPLASH
  ═══════════════════════════════════════════════════ -->
  <div id="splash" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-logo">
        <span class="logo-local">Local</span><span class="logo-cerca">Cerca</span>
      </div>
      <div class="splash-tagline">Negocios de tu colonia</div>
      <div class="splash-bar"><div class="splash-progress"></div></div>
      <div class="splash-locating">
        <span class="locating-dot"></span>
        Localizando tu posición…
      </div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════ -->
  <header id="header" role="banner">
    <div class="header-inner">

      <!-- Logo -->
      <a href="/" class="logo" aria-label="LocalCerca inicio">
        <span class="logo-local">Local</span><span class="logo-cerca">Cerca</span><span class="logo-dot" aria-hidden="true">·</span>
      </a>

      <!-- Search -->
      <div class="search-container" role="search">
        <div class="search-field" id="search-field">
          <svg class="search-icon" aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder="¿Qué buscas? impresión, banco, minutas…"
            autocomplete="off"
            aria-label="Buscar negocios"
            aria-autocomplete="list"
            aria-controls="search-suggestions"
          />
          <button class="search-clear" id="search-clear" aria-label="Limpiar búsqueda" hidden>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </div>

        <!-- Sugerencias -->
        <div class="search-suggestions" id="search-suggestions" role="listbox" aria-label="Sugerencias de búsqueda" hidden>
          <div class="suggestions-label">Búsquedas frecuentes cerca de ti</div>
          <div class="suggestions-chips" id="suggestions-chips"></div>
        </div>
      </div>

      <!-- Acciones header -->
      <div class="header-actions">
        <button class="btn-icon" id="btn-gps" aria-label="Ir a mi ubicación" title="Mi ubicación">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/><path d="M12 2v3m0 14v3M2 12h3m14 0h3"/>
            <path d="M12 2a10 10 0 0 1 10 10"/>
          </svg>
        </button>
        <a href="registro.html" class="btn-registrar" aria-label="Registrar mi negocio">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>Mi negocio</span>
        </a>
      </div>

    </div>

    <!-- Colonias -->
    <nav class="colonia-bar" aria-label="Filtrar por colonia">
      <span class="colonia-label" aria-hidden="true">Zona</span>
      <div class="colonias-scroll" role="group" aria-label="Colonias disponibles">
        <button class="chip chip--active" data-colonia="todos" aria-pressed="true">Todas</button>
        <button class="chip" data-colonia="Urb. Nuevo Lourdes" aria-pressed="false">Urb. Nuevo Lourdes</button>
        <button class="chip" data-colonia="Col. Escalón" aria-pressed="false">Col. Escalón</button>
        <button class="chip" data-colonia="Santa Elena" aria-pressed="false">Santa Elena</button>
        <button class="chip" data-colonia="Merliot" aria-pressed="false">Merliot</button>
        <button class="chip" data-colonia="Antiguo Cuscatlán" aria-pressed="false">Antiguo Cuscatlán</button>
        <button class="chip" data-colonia="Soyapango" aria-pressed="false">Soyapango</button>
      </div>
    </nav>
  </header>

  <!-- ═══════════════════════════════════════════════════
       MAPA
  ═══════════════════════════════════════════════════ -->
  <main id="main-content">
    <div id="map" role="application" aria-label="Mapa de negocios locales"></div>

    <!-- Controles flotantes del mapa -->
    <div class="map-controls" aria-label="Controles del mapa">
      <div class="map-ctrl-group">
        <button class="map-ctrl-btn" id="zoom-in" aria-label="Acercar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
        </button>
        <div class="map-ctrl-divider"></div>
        <button class="map-ctrl-btn" id="zoom-out" aria-label="Alejar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
        </button>
      </div>
    </div>

    <!-- Indicador de resultado -->
    <div class="result-badge" id="result-badge" aria-live="polite" aria-atomic="true" hidden>
      <span id="result-text"></span>
    </div>

    <!-- Leyenda -->
    <div class="map-legend" aria-label="Leyenda del mapa">
      <div class="legend-item">
        <span class="legend-dot legend-dot--premium" aria-hidden="true"></span>
        <span>Premium</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot--regular" aria-hidden="true"></span>
        <span>Local</span>
      </div>
      <div class="legend-item">
        <span class="legend-dot legend-dot--user" aria-hidden="true"></span>
        <span>Tú</span>
      </div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════════════
       PANEL / GAVETA DE NEGOCIOS
  ═══════════════════════════════════════════════════ -->
  <aside id="panel" aria-label="Lista de negocios" aria-expanded="true">

    <!-- Handle para arrastrar en móvil -->
    <div class="panel-handle" id="panel-handle" role="button" aria-label="Contraer o expandir lista" tabindex="0">
      <div class="handle-bar" aria-hidden="true"></div>
    </div>

    <div class="panel-header">
      <div class="panel-meta">
        <h2 class="panel-title" id="panel-title">Negocios cercanos</h2>
        <span class="panel-count" id="panel-count" aria-live="polite"></span>
      </div>
      <div class="panel-sort">
        <select id="sort-select" aria-label="Ordenar resultados" class="sort-select">
          <option value="relevancia">Relevancia</option>
          <option value="distancia">Distancia</option>
          <option value="estrellas">Estrellas</option>
        </select>
      </div>
    </div>

    <!-- Tarjetas -->
    <div class="cards-scroll" id="cards-scroll" role="list" aria-label="Lista de negocios">

      <!-- Estado vacío -->
      <div class="empty-state" id="empty-state" hidden role="status">
        <div class="empty-icon" aria-hidden="true">🔍</div>
        <p class="empty-title">Sin resultados</p>
        <p class="empty-desc">No encontramos negocios para "<strong id="empty-term"></strong>".<br>Prueba con otro término o cambia de zona.</p>
        <button class="empty-clear" onclick="clearSearch()">Ver todos los negocios</button>
      </div>

      <!-- Estado de carga -->
      <div class="loading-state" id="loading-state" role="status" aria-label="Cargando negocios">
        <div class="skeleton-card" aria-hidden="true"></div>
        <div class="skeleton-card" aria-hidden="true"></div>
        <div class="skeleton-card" aria-hidden="true"></div>
      </div>

    </div>
  </aside>

  <!-- ═══════════════════════════════════════════════════
       MODAL DETALLE
  ═══════════════════════════════════════════════════ -->
  <div id="modal-overlay" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-name" hidden>
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Cerrar detalle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>

      <div class="modal-scroll">

        <!-- Cabecera modal -->
        <div class="modal-top">
          <div class="modal-emoji" id="modal-emoji" aria-hidden="true"></div>
          <div class="modal-top-info">
            <div class="modal-badges" id="modal-badges"></div>
            <h2 class="modal-name" id="modal-name"></h2>
            <div class="modal-colonia" id="modal-colonia"></div>
          </div>
        </div>

        <!-- Estrellas + estado -->
        <div class="modal-rating" id="modal-rating"></div>

        <!-- Descripción -->
        <p class="modal-desc" id="modal-desc"></p>

        <!-- Servicios -->
        <div class="modal-section">
          <div class="modal-section-title">Servicios disponibles</div>
          <div class="modal-tags" id="modal-tags"></div>
        </div>

        <!-- Info grid -->
        <div class="modal-grid" id="modal-grid"></div>

        <!-- Contacto (solo premium) -->
        <div class="modal-section" id="modal-contact-section">
          <div class="modal-section-title" id="modal-contact-title"></div>
          <div class="modal-contact-list" id="modal-contact-list"></div>
        </div>

      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
