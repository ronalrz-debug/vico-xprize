<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>vico · Descubre los comercios de tu colonia</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg: #0D1410; --surface: #141C18; --accent: #22A05E; --text: #FFFFFF;
    }
    body { margin: 0; padding: 0; font-family: sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
    header { background: var(--surface); padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; gap: 10px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; }
    .search-box { display: flex; gap: 8px; flex: 1; max-width: 500px; margin: 0 15px; }
    input[type="search"] { flex: 1; padding: 10px; background: #1C2820; border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; color: white; }
    .btn-ia { background: var(--accent); border: none; color: white; padding: 10px 14px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .chip-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
    .chip { background: #1C2820; border: 1px solid rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 20px; color: #aaa; cursor: pointer; white-space: nowrap; }
    .chip.active { background: var(--accent); color: white; border-color: var(--accent); }
    #layout { display: flex; flex: 1; height: calc(100vh - 120px); position: relative; }
    #map { flex: 1; height: 100%; background: #111; }
    #panel { width: 320px; background: var(--surface); border-left: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; padding: 15px; overflow-y: auto; }
    .biz-card { background: #1C2820; border-radius: 8px; padding: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.05); }
    .biz-title { margin: 0 0 5px 0; font-size: 16px; color: var(--text); }
    .biz-desc { margin: 0 0 10px 0; font-size: 12px; color: #aaa; line-height: 1.4; }
    .btn-locate { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 5px 10px; border-radius: 4px; font-size: 11px; cursor: pointer; }
    #splash { position: fixed; top:0; left:0; width:100%; height:100%; background: var(--bg); display: flex; justify-content: center; align-items: center; z-index: 9999; font-size: 20px; font-weight: bold; color: var(--accent); }
  </style>
</head>
<body>

  <div id="splash">vico · Cargando mapa de cercanía inteligente...</div>

  <header>
    <div class="top-bar">
      <div style="font-size: 22px; font-weight: bold; color: var(--accent)">vico<span style="color:white">.</span></div>
      <div class="search-box">
        <input type="search" id="search-input" placeholder="Pregúntale a la IA: 'quiero algo dulce de tarde' o 'copias'...">
        <button class="btn-ia" id="search-btn">Buscar con IA ✨</button>
      </div>
      <a href="registro.html" style="color: white; font-size: 13px; text-decoration: none; background: #1C2820; padding: 8px 12px; border-radius: 6px;">+ Registrar Negocio</a>
    </div>
    <div class="chip-bar">
      <div class="chip active" data-colonia="todos">Todas las zonas</div>
      <div class="chip" data-colonia="Urb. Nuevo Lourdes">Urb. Nuevo Lourdes</div>
      <div class="chip" data-colonia="Col. Escalón">Col. Escalón</div>
      <div class="chip" data-colonia="Santa Elena">Santa Elena</div>
      <div class="chip" data-colonia="Merliot">Merliot</div>
    </div>
  </header>

  <div id="layout">
    <div id="map"></div>
    <div id="panel">
      <h3 style="margin-top: 0;">Resultados cercanos</h3>
      <div id="cards-container"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
