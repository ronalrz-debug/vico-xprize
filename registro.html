<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Registra tu Negocio en vico</title>
  <style>
    :root {
      --bg: #0D1410;
      --surface: #141C18;
      --surface-input: #1C2820;
      --accent: #22A05E;
      --text: #FFFFFF;
      --text-muted: #aaaaaa;
    }

    body { 
      font-family: sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 20px; 
      margin: 0;
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .form-box { 
      background: var(--surface); 
      padding: 25px; 
      border-radius: 12px; 
      max-width: 450px; 
      width: 100%; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
    }

    h2 { 
      font-size: 22px;
      margin: 0 0 8px 0;
      color: var(--accent); 
    }

    .subtitle {
      font-size: 13px; 
      color: var(--text-muted);
      margin-bottom: 20px;
      line-height: 1.4;
    }

    label { 
      display: block; 
      margin: 14px 0 6px; 
      font-size: 14px; 
    }

    input, textarea, select { 
      width: 100%; 
      padding: 12px; 
      background: var(--surface-input); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 6px; 
      color: var(--text); 
      font-size: 14px;
      box-sizing: border-box; 
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    .coord-row {
      display: flex; 
      gap: 10px;
      margin-bottom: 8px;
    }

    .coord-btn { 
      background: var(--surface-input); 
      border: 1px dashed var(--accent); 
      color: var(--accent); 
      width: 100%;
      padding: 10px; 
      border-radius: 6px;
      font-size: 13px; 
      font-weight: bold;
      cursor: pointer; 
    }

    .btn-submit { 
      background: var(--accent); 
      color: white; 
      border: none; 
      padding: 14px; 
      width: 100%; 
      border-radius: 6px; 
      margin-top: 24px; 
      font-size: 15px;
      font-weight: bold; 
      cursor: pointer; 
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div class="form-box">
    <h2>Da de alta tu negocio</h2>
    <p class="subtitle">Ingresa los datos de tu comercio. Pasarán por revisión antes de aparecer en el mapa.</p>
    
    <form id="registroForm">
      <label>Nombre del Comercio *</label>
      <input type="text" id="nombre" required placeholder="Ej. Pupusería El Buen Sabor">

      <label>Colonia / Zona *</label>
      <select id="colonia" required>
        <option value="Urb. Nuevo Lourdes">Urb. Nuevo Lourdes</option>
        <option value="Col. Escalón">Col. Escalón</option>
        <option value="Santa Elena">Santa Elena</option>
        <option value="Merliot">Merliot</option>
      </select>

      <label>Categoría principal</label>
      <select id="categoria">
        <option value="servicios">Servicios (Impresiones, Pagos, Copias)</option>
        <option value="comida">Comida y Restaurantes</option>
        <option value="salud">Salud y Farmacias</option>
        <option value="ocio">Ocio y Otros</option>
      </select>

      <label>Descripción de tus servicios *</label>
      <textarea id="descripcion" rows="3" required placeholder="Ej. Impresiones, copias, pago de recibos de luz y agua."></textarea>

      <label>Teléfono (Opcional)</label>
      <input type="tel" id="telefono" placeholder="Ej. 2233-4455">

      <label>Coordenadas en el Mapa *</label>
      <div class="coord-row">
        <input type="text" id="lat" placeholder="Latitud" required>
        <input type="text" id="lng" placeholder="Longitud" required>
      </div>
      <button type="button" class="coord-btn" onclick="obtenerCoordenadasActuales()">📍 Detectar ubicación por GPS automáticamente</button>

      <button type="submit" class="btn-submit">Enviar Registro</button>
    </form>

    <a href="index.html" class="back-link">← Volver al mapa</a>
  </div>

  <script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyaZXNodzFzX8veAs4gX0dF7pp6ApAQWch9d-iQ9_4Ar-ZjzeNHdQ5waiaMquUeDbJ0/exec";

    function obtenerCoordenadasActuales() {
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            document.getElementById('lat').value = pos.coords.latitude;
            document.getElementById('lng').value = pos.coords.longitude;
            alert("Ubicación GPS capturada con éxito.");
          }, 
          (error) => {
            alert("No se pudo obtener el GPS. Puedes escribir las coordenadas manualmente.");
          },
          { enableHighAccuracy: true }
        );
      } else {
        alert("Tu dispositivo no soporta geolocalización, escribe las coordenadas a mano.");
      }
    }

    document.getElementById('registroForm').onsubmit = async (e) => {
      e.preventDefault();
      
      const formData = new URLSearchParams();
      formData.append('nombre', document.getElementById('nombre').value);
      formData.append('colonia', document.getElementById('colonia').value);
      formData.append('categoria', document.getElementById('categoria').value);
      formData.append('descripcion', document.getElementById('descripcion').value);
      formData.append('telefono', document.getElementById('telefono').value);
      formData.append('lat', document.getElementById('lat').value);
      formData.append('lng', document.getElementById('lng').value);

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors', 
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded'
          },
          body: formData.toString()
        });
        
        alert("¡Solicitud enviada! Los datos se guardaron en revisión.");
        document.getElementById('registroForm').reset();
      } catch (err) {
        alert("Error de red al enviar el formulario.");
      }
    };
  </script>
</body>
</html>
