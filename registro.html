<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Registra tu Negocio en vico</title>
  <style>
    :root {
      --bg: #0D1410;
      --surface: #141C18;
      --surface-input: #1C2820;
      --accent: #22A05E;
      --text: #FFFFFF;
      --text-muted: #aaaaaa;
    }

    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      background: var(--bg); 
      color: var(--text); 
      padding: 20px; 
      margin: 0;
      display: flex; 
      justify-content: center; 
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .form-box { 
      background: var(--surface); 
      padding: 30px; 
      border-radius: 12px; 
      max-width: 450px; 
      width: 100%; 
      border: 1px solid rgba(255, 255, 255, 0.08); 
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.24);
    }

    h2 { 
      font-size: 24px;
      margin-top: 0; 
      margin-bottom: 8px;
      color: var(--accent); 
    }

    .subtitle {
      font-size: 13px; 
      color: var(--text-muted);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    label { 
      display: block; 
      margin: 16px 0 6px; 
      font-size: 14px; 
      font-weight: 500;
    }

    input, textarea, select { 
      width: 100%; 
      padding: 12px; 
      background: var(--surface-input); 
      border: 1px solid rgba(255, 255, 255, 0.1); 
      border-radius: 6px; 
      color: var(--text); 
      font-size: 14px;
      box-sizing: border-box; 
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    textarea {
      resize: vertical;
    }

    .coord-row {
      display: flex; 
      gap: 10px;
      margin-bottom: 8px;
    }

    .coord-btn { 
      background: var(--surface-input); 
      border: 1px dashed var(--accent); 
      color: var(--accent); 
      width: 100%;
      padding: 10px; 
      border-radius: 6px;
      font-size: 13px; 
      font-weight: 600;
      cursor: pointer; 
      transition: background 0.2s;
    }

    .coord-btn:hover {
      background: rgba(34, 160, 94, 0.1);
    }

    .btn-submit { 
      background: var(--accent); 
      color: white; 
      border: none; 
      padding: 14px; 
      width: 100%; 
      border-radius: 6px; 
      margin-top: 28px; 
      font-size: 15px;
      font-weight: bold; 
      cursor: pointer; 
      transition: opacity 0.2s;
    }

    .btn-submit:hover {
      opacity: 0.9;
    }

    .back-link {
      display: block;
      text-align: center;
      margin-top: 16px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }

    .back-link:hover {
      color: var(--text);
    }
  </style>
</head>
<body>

        <option value="Santa Elena">Santa Elena</option>
        <option value="Merliot">Merliot</option>
      </select>
